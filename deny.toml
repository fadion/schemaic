# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
#   cargo install cargo-deny
#   cargo deny check
#
# Guards the dependency tree so a future `cargo update` cannot silently pull in a
# crate whose license is incompatible with shipping Schemaic under MIT.

[licenses]
# Every license we accept. All permissive; MPL-2.0 is weak (file-level) copyleft
# that does not affect our own source. GPL/LGPL are intentionally ABSENT — the
# only crates that mention them are dual-licensed (e.g. self_cell is
# "Apache-2.0 OR GPL-2.0-only"), and cargo-deny satisfies such an OR-expression
# via the permissive branch below, so no GPL terms ever apply.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "BSL-1.0",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

# The bundled IBM Plex fonts (OFL-1.1) are an embedded asset, not a crate, so
# cargo-deny doesn't see them — they're covered in THIRD-PARTY-NOTICES.md.

[advisories]
# Unmaintained crates pulled in transitively (e.g. `paste` via wgpu/floem) can't
# be fixed by us — only flag unmaintained advisories for our own workspace deps.
unmaintained = "workspace"
# Vulnerabilities are denied by default. Each entry below is a conscious, reviewed
# exception — a specific advisory we've assessed as not reachable / not fixable.
ignore = [
    # quick-xml < 0.41 quadratic-time attribute parsing (DoS). Only exploitable
    # via UNTRUSTED XML input; Schemaic parses only its own bundled SVG icons
    # (a fixed, trusted set) through usvg/resvg. The fix (quick-xml >= 0.41) is
    # gated behind usvg/resvg ← floem 0.2.0, so there's no upgrade path yet.
    # Revisit when floem bumps its SVG rendering stack.
    "RUSTSEC-2026-0194",
    # quick-xml < 0.41 unbounded namespace-declaration allocation (memory-exhaustion
    # DoS). Same reachability + upgrade situation as RUSTSEC-2026-0194 above.
    "RUSTSEC-2026-0195",
    # `rsa` "Marvin Attack" timing sidechannel (RSA key recovery). Pulled by russh
    # for RSA SSH key/host support. No patched `rsa` release exists yet. The attack
    # needs fine-grained timing of many RSA operations, impractical against a DB
    # client connecting to known servers. Revisit when `rsa` ships a fix (or drop
    # russh's `rsa` feature if RSA SSH keys aren't needed).
    "RUSTSEC-2023-0071",
]

[bans]
# Duplicate versions are common in a GUI + async tree; surface them without
# failing the build.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io. A dependency pulled from an unknown registry or a git URL fails.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
