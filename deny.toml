# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
#   cargo install cargo-deny
#   cargo deny check
#
# Guards the dependency tree so a future `cargo update` cannot silently pull in a
# crate whose license is incompatible with shipping Schemaic under MIT.

[licenses]
# Every license we accept. All permissive; MPL-2.0 is weak (file-level) copyleft
# that does not affect our own source. GPL/LGPL are intentionally ABSENT — the
# only crates that mention them are dual-licensed (e.g. self_cell is
# "Apache-2.0 OR GPL-2.0-only"), and cargo-deny satisfies such an OR-expression
# via the permissive branch below, so no GPL terms ever apply.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "BSL-1.0",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

# The bundled IBM Plex fonts (OFL-1.1) are an embedded asset, not a crate, so
# cargo-deny doesn't see them — they're covered in THIRD-PARTY-NOTICES.md.

[advisories]
# Deny known-vulnerable and yanked crates (cargo-deny defaults). Add RUSTSEC IDs
# here to consciously accept a specific advisory.
ignore = []

[bans]
# Duplicate versions are common in a GUI + async tree; surface them without
# failing the build.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io. A dependency pulled from an unknown registry or a git URL fails.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
